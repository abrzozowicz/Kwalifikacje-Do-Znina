<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Pro | Dark Green Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* KOLORYSTYKA */
            --bg-dark: #050505;          /* Głęboka czerń */
            --card-bg: #0d110f;          /* Ciemna zieleń (tło kart) */
            --border-green: #1a2e23;     /* Ciemny zielony obramowania */
            --accent-green: #22c55e;     /* Neonowa zieleń */
            --text-white: #f8fafc;
            --text-gray: #94a3b8;
            
            /* PODIUM (Zieleń z odcieniem kruszcu) */
            --gold-green: linear-gradient(135deg, #22c55e 0%, #166534 100%);
            --silver-green: linear-gradient(135deg, #4ade80 0%, #14532d 100%);
            --bronze-green: linear-gradient(135deg, #15803d 0%, #052e16 100%);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            width: 100%;
            padding: 40px 10px;
        }

        h1 {
            font-size: clamp(1.5rem, 8vw, 3rem); /* Responsywna czcionka */
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: var(--text-white);
            border-bottom: 4px solid var(--accent-green);
            display: inline-block;
            padding-bottom: 5px;
        }

        /* KONTENER GŁÓWNY */
        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            border: 1px solid var(--border-green);
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.05);
            overflow: hidden;
        }

        /* TABELA RESPONSYWNA */
        .table-wrapper {
            width: 100%;
            overflow-x: auto; /* Przewijanie na małych telefonach */
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            min-width: 500px; /* Zapobiega zbytniemu ściskaniu kolumn */
        }

        th {
            padding: 15px;
            color: var(--accent-green);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-align: left;
            border-bottom: 1px solid var(--border-green);
        }

        td {
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            font-size: 1rem;
            border-top: 1px solid var(--border-green);
            border-bottom: 1px solid var(--border-green);
        }

        /* Zaokrąglenia wierszy */
        td:first-child { border-left: 1px solid var(--border-green); border-radius: 10px 0 0 10px; font-weight: 700; }
        td:last-child { border-right: 1px solid var(--border-green); border-radius: 0 10px 10px 0; text-align: right; }

        /* PODIUM */
        tbody tr:nth-child(1) td { background: var(--gold-green); color: white; border: none; }
        tbody tr:nth-child(2) td { background: var(--silver-green); color: white; border: none; }
        tbody tr:nth-child(3) td { background: var(--bronze-green); color: white; border: none; }

        /* HOVER DLA RESZTY */
        tbody tr:nth-child(n+4):hover td {
            background: rgba(34, 197, 94, 0.1);
            border-color: var(--accent-green);
            transition: 0.3s;
        }

        /* STATUS I STOPKA */
        .footer {
            margin-top: 20px;
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-gray);
            padding: 10px;
        }

        .live-tag {
            background: #15803d;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        #loader { padding: 50px; text-align: center; color: var(--accent-green); font-weight: bold; }

        /* MEDIA QUERIES - DOSTOSOWANIE POD TELEFONY */
        @media (max-width: 600px) {
            body { padding: 5px; }
            td, th { padding: 12px 8px; font-size: 0.85rem; }
            .container { border-radius: 10px; }
            .footer { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Turniej Reprezentantów</h1>
    </header>
    
    <div class="container">
        <div id="loader">ŁĄCZENIE Z SERWEREM GOOGLE...</div>
        <div class="table-wrapper">
            <table id="targetTable" style="display:none;">
                <thead>
                    <tr id="headers"></tr>
                </thead>
                <tbody id="content"></tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        <div class="live-tag">
            <div class="pulse"></div> LIVE
        </div>
        <span id="ts">Inicjalizacja...</span>
        <span id="conn">Status: Oczekiwanie</span>
    </div>

    <script>
        const SHEET_ID = '1-Rry40TELMzcxD9n9AjLAXNs2lIGc0mFaeOURWbqfbk';
        const SHEET_NAME = 'Arkusz1'; 

        async function syncData() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}') + 1));
                
                const table = json.table;
                const hRow = document.getElementById('headers');
                const bRow = document.getElementById('content');

                hRow.innerHTML = '';
                bRow.innerHTML = '';

                // Budowa nagłówków
                table.cols.forEach(c => {
                    if(c.label) {
                        const th = document.createElement('th');
                        th.textContent = c.label;
                        hRow.appendChild(th);
                    }
                });

                // Budowa wierszy
                table.rows.forEach((r, rowIndex) => {
                    const tr = document.createElement('tr');
                    r.c.forEach((cell, i) => {
                        if(table.cols[i].label) {
                            const td = document.createElement('td');
                            let val = cell ? (cell.f || cell.v || "") : "";
                            
                            // Dodatki medalowe dla podium
                            if(i === 0) {
                                if(rowIndex === 0) val = "🏆 " + val;
                                if(rowIndex === 1) val = "⭐ " + val;
                                if(rowIndex === 2) val = "✨ " + val;
                            }
                            
                            td.textContent = val;
                            tr.appendChild(td);
                        }
                    });
                    bRow.appendChild(tr);
                });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('targetTable').style.display = 'table';
                document.getElementById('ts').textContent = `Aktualizacja: ${new Date().toLocaleTimeString()}`;
                document.getElementById('conn').textContent = "Połączenie stabilne";

            } catch (e) {
                document.getElementById('conn').textContent = "Błąd synchronizacji";
                console.error(e);
            }
        }

        syncData();
        setInterval(syncData, 20000); // Odświeżanie co 20 sekund
    </script>
</body>
</html>
