    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* KOLORYSTYKA ZGODNA Z GRAFIKĄ (Czerń i Złoto) */
            --bg-dark: #0a0a0a;
            --card-bg: #111111;
            --gold-accent: #c5a059;
            --gold-dark: #8e6d31;
            --text-white: #e5e7eb;
            --text-gold: #d4af37;
            
            /* GRADIENTY PODIUM */
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #8e6d31 100%);
            --silver-gradient: linear-gradient(135deg, #adb5bd 0%, #495057 100%);
            --bronze-gradient: linear-gradient(135deg, #a0522d 0%, #5d2906 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 10px;
            max-width: 900px;
        }

        h1 {
            font-size: clamp(1.2rem, 6vw, 2.5rem);
            color: var(--text-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            border-bottom: 2px solid var(--gold-accent);
            padding-bottom: 10px;
            line-height: 1.2;
        }

        .subtitle {
            margin-top: 15px;
            color: var(--gold-accent);
            font-weight: 700;
            letter-spacing: 2px;
            font-size: clamp(0.7rem, 3vw, 1rem);
            text-transform: uppercase;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border: 1px solid var(--gold-dark);
            border-radius: 12px;
            padding: 5px;
            box-shadow: 0 0 40px rgba(197, 160, 89, 0.1);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            min-width: 600px;
        }

        th {
            padding: 15px;
            color: var(--text-gold);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            text-align: left;
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        td {
            padding: 16px 15px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid rgba(197, 160, 89, 0.1);
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
            font-size: 1rem;
        }

        td:first-child { border-left: 1px solid rgba(197, 160, 89, 0.2); border-radius: 8px 0 0 8px; font-weight: 700; }
        td:last-child { border-right: 1px solid rgba(197, 160, 89, 0.2); border-radius: 0 8px 8px 0; text-align: right; }

        /* PODIUM */
        tbody tr:nth-child(1) td { background: var(--gold-gradient); color: #2a1e00; border: none; font-weight: 900; }
        tbody tr:nth-child(2) td { background: var(--silver-gradient); color: #ffffff; border: none; font-weight: 700; }
        tbody tr:nth-child(3) td { background: var(--bronze-gradient); color: #ffffff; border: none; font-weight: 700; }

        /* HOVER DLA POZOSTAŁYCH */
        tbody tr:nth-child(n+4):hover td {
            background: rgba(197, 160, 89, 0.15);
            transition: 0.3s;
        }

        .footer {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #666;
            padding: 10px;
        }

        .live-tag {
            color: var(--text-gold);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--text-gold);
            border-radius: 50%;
            animation: blink 1.2s infinite;
            box-shadow: 0 0 10px var(--text-gold);
        }

        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        #loader { padding: 40px; text-align: center; color: var(--gold-accent); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>Kwalifikacje do Turnieju Reprezentantów</h1>
        <div class="subtitle">3 TURNIEJE | JEDEN RANKING | 3 BILETY</div>
    </header>
    
    <div class="container">
        <div id="loader">POBIERANIE WYNIKÓW LIVE...</div>
        <div class="table-wrapper">
            <table id="targetTable" style="display:none;">
                <thead>
                    <tr id="headers"></tr>
                </thead>
                <tbody id="content"></tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        <div class="live-tag"><div class="dot"></div> LIVE RESULTS</div>
        <span id="ts">Inicjalizacja systemu...</span>
    </div>

    <script>
        const SHEET_ID = '1-Rry40TELMzcxD9n9AjLAXNs2lIGc0mFaeOURWbqfbk';
        const SHEET_NAME = 'Arkusz1'; 

        async function syncData() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
            
            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}') + 1));
                
                const table = json.table;
                const hRow = document.getElementById('headers');
                const bRow = document.getElementById('content');

                hRow.innerHTML = '';
                bRow.innerHTML = '';

                // Nagłówki
                table.cols.forEach(c => {
                    if(c.label) {
                        const th = document.createElement('th');
                        th.textContent = c.label;
                        hRow.appendChild(th);
                    }
                });

                // Wiersze
                table.rows.forEach((r, rowIndex) => {
                    const tr = document.createElement('tr');
                    r.c.forEach((cell, i) => {
                        if(table.cols[i].label) {
                            const td = document.createElement('td');
                            let val = cell ? (cell.f || cell.v || "") : "";
                            
                            // Ikony podium dla pierwszej kolumny
                            if(i === 0) {
                                if(rowIndex === 0) val = "🥇 " + val;
                                else if(rowIndex === 1) val = "🥈 " + val;
                                else if(rowIndex === 2) val = "🥉 " + val;
                            }
                            
                            td.textContent = val;
                            tr.appendChild(td);
                        }
                    });
                    bRow.appendChild(tr);
                });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('targetTable').style.display = 'table';
                document.getElementById('ts').textContent = `Ostatnia aktualizacja: ${new Date().toLocaleTimeString()}`;

            } catch (e) { 
                console.error("Błąd połączenia z arkuszem:", e);
                document.getElementById('loader').textContent = "BŁĄD ŁADOWANIA DANYCH";
            }
        }

        syncData();
        setInterval(syncData, 30000); 
    </script>
</body>
</html>
