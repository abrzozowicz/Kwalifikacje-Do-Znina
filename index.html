<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Kwalifikacje do Turnieju Reprezentantów | Live</title>
    <meta name="description" content="3 Turnieje, Jeden Ranking, 3 Bilety. Śledź wyniki na żywo!">
    <meta property="og:title" content="Kwalifikacje do Turnieju Reprezentantów">
    <meta property="og:description" content="3 Turnieje, Jeden Ranking, 3 Bilety. Sprawdź aktualną klasyfikację!">
    <meta property="og:type" content="website">
    <meta property="og:image" content="link_do_twojego_obrazka.jpg"> 

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* KOLORYSTYKA ZGODNA Z GRAFIKĄ */
            --bg-dark: #0a0a0a;          /* Głęboka czerń tła */
            --card-bg: #111111;          /* Tekstura tła */
            --gold-accent: #c5a059;      /* Złoto z logo/napisów */
            --gold-dark: #8e6d31;        /* Ciemniejsze złoto do obramowań */
            --text-white: #e5e7eb;
            --text-gold: #d4af37;
            
            /* GRADIENTY PODIUM - EFEKT METALICZNY */
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #8e6d31 100%);
            --silver-gradient: linear-gradient(135deg, #adb5bd 0%, #495057 100%);
            --bronze-gradient: linear-gradient(135deg, #a0522d 0%, #5d2906 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 30px 10px;
            max-width: 800px;
        }

        h1 {
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            color: var(--text-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            border-bottom: 2px solid var(--gold-accent);
            padding-bottom: 10px;
        }

        .subtitle {
            margin-top: 10px;
            color: var(--gold-accent);
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border: 1px solid var(--gold-dark);
            border-radius: 12px;
            padding: 5px;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.1);
            overflow: hidden;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 6px;
        }

        th {
            padding: 15px;
            color: var(--text-gold);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-align: left;
        }

        td {
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(197, 160, 89, 0.2);
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        td:first-child { border-left: 1px solid var(--gold-dark); border-radius: 8px 0 0 8px; font-weight: 700; }
        td:last-child { border-right: 1px solid var(--gold-dark); border-radius: 0 8px 8px 0; text-align: right; }

        /* PODIUM ZGODNE Z KLASYKĄ */
        tbody tr:nth-child(1) td { background: var(--gold-gradient); color: #2a1e00; border: none; }
        tbody tr:nth-child(2) td { background: var(--silver-gradient); color: #ffffff; border: none; }
        tbody tr:nth-child(3) td { background: var(--bronze-gradient); color: #ffffff; border: none; }

        /* HOVER */
        tbody tr:nth-child(n+4):hover td {
            background: rgba(197, 160, 89, 0.15);
            transition: 0.3s;
        }

        .footer {
            margin-top: 20px;
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #777;
        }

        .live-tag {
            color: #d4af37;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
        }

        .dot {
            width: 7px;
            height: 7px;
            background: #d4af37;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>

    <header>
        <h1>Kwalifikacje do Turnieju Reprezentantów</h1>
        <div class="subtitle">3 TURNIEJE | JEDEN RANKING | 3 BILETY</div>
    </header>
    
    <div class="container">
        <div class="table-wrapper">
            <table id="targetTable">
                <thead>
                    <tr id="headers"></tr>
                </thead>
                <tbody id="content">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        <div class="live-tag"><div class="dot"></div> LIVE RESULTS</div>
        <span id="ts">Inicjalizacja...</span>
    </div>

    <script>
        const SHEET_ID = '1-Rry40TELMzcxD9n9AjLAXNs2lIGc0mFaeOURWbqfbk';
        const SHEET_NAME = 'Arkusz1'; 

        async function syncData() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}') + 1));
                
                const table = json.table;
                const hRow = document.getElementById('headers');
                const bRow = document.getElementById('content');

                hRow.innerHTML = '';
                bRow.innerHTML = '';

                table.cols.forEach(c => {
                    if(c.label) {
                        const th = document.createElement('th');
                        th.textContent = c.label;
                        hRow.appendChild(th);
                    }
                });

                table.rows.forEach((r, rowIndex) => {
                    const tr = document.createElement('tr');
                    r.c.forEach((cell, i) => {
                        if(table.cols[i].label) {
                            const td = document.createElement('td');
                            let val = cell ? (cell.f || cell.v || "") : "";
                            
                            if(i === 0) {
                                if(rowIndex === 0) val = "🥇 " + val;
                                if(rowIndex === 1) val = "🥈 " + val;
                                if(rowIndex === 2) val = "🥉 " + val;
                            }
                            
                            td.textContent = val;
                            tr.appendChild(td);
                        }
                    });
                    bRow.appendChild(tr);
                });
                document.getElementById('ts').textContent = `Aktualizacja: ${new Date().toLocaleTimeString()}`;
            } catch (e) { console.error(e); }
        }

        syncData();
        setInterval(syncData, 30000);
    </script>
</body>
</html>
