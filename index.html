<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Score |Kwalifikacje do Turniej Reprezentantów - Żnin  </title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --border: #334155;
            --green: #22c55e;
            --red: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.5rem;
            margin: 20px 0;
        }

        .table-container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #0ea5e9;
            color: white;
            padding: 12px 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tr:nth-child(even) { background-color: rgba(255,255,255,0.03); }
        tr:hover { background-color: rgba(56, 189, 248, 0.1); }

        .status-bar {
            width: 100%;
            max-width: 900px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        #loading-overlay {
            padding: 40px;
            text-align: center;
            color: var(--accent);
        }

        #error-display {
            display: none;
            padding: 20px;
            color: var(--red);
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Turniej Reprezentantów</h1>
    
    <div class="table-container">
        <div id="loading-overlay">Ładowanie wyników...</div>
        <div id="error-display"></div>
        
        <table id="resultsTable" style="display:none;">
            <thead>
                <tr id="headerRow"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="status-bar">
        <span id="lastUpdate">Aktualizacja: --:--:--</span>
        <span id="connectionStatus" style="color: var(--red);">Brak połączenia</span>
    </div>

    <script>
        // Dane Twojego arkusza
        const SHEET_ID = '1-Rry40TELMzcxD9n9AjLAXNs2lIGc0mFaeOURWbqfbk';
        const SHEET_NAME = 'Arkusz1'; 

        async function fetchData() {
            // URL korzystający z API wizualizacji Google, który zwraca JSON
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

            try {
                const response = await fetch(url);
                const text = await response.text();
                
                // Oczyszczanie odpowiedzi (Google dodaje śmieci przed właściwym JSONem)
                const startIdx = text.indexOf('{');
                const endIdx = text.lastIndexOf('}') + 1;
                const jsonData = JSON.parse(text.substring(startIdx, endIdx));
                
                renderTable(jsonData.table);
                updateUI(true);
            } catch (err) {
                console.error("Błąd pobierania:", err);
                updateUI(false);
            }
        }

        function renderTable(data) {
            const headerRow = document.getElementById('headerRow');
            const tableBody = document.getElementById('tableBody');
            const loading = document.getElementById('loading-overlay');
            const table = document.getElementById('resultsTable');
            const error = document.getElementById('error-display');

            headerRow.innerHTML = '';
            tableBody.innerHTML = '';

            // 1. Generuj Nagłówki
            data.cols.forEach(col => {
                if (col.label) {
                    const th = document.createElement('th');
                    th.textContent = col.label;
                    headerRow.appendChild(th);
                }
            });

            // 2. Generuj Wiersze
            data.rows.forEach(row => {
                const tr = document.createElement('tr');
                row.c.forEach((cell, index) => {
                    // Pomijaj kolumny bez nagłówka (opcjonalnie)
                    if (data.cols[index].label) {
                        const td = document.createElement('td');
                        // cell.f to sformatowana wartość, cell.v to surowa
                        td.textContent = cell ? (cell.f || cell.v || "") : "";
                        tr.appendChild(td);
                    }
                });
                tableBody.appendChild(tr);
            });

            loading.style.display = 'none';
            error.style.display = 'none';
            table.style.display = 'table';
        }

        function updateUI(success) {
            const status = document.getElementById('connectionStatus');
            const clock = document.getElementById('lastUpdate');
            const now = new Date().toLocaleTimeString();

            if (success) {
                status.textContent = "Połączono online";
                status.style.color = "var(--green)";
                clock.textContent = `Ostatnia aktualizacja: ${now}`;
            } else {
                status.textContent = "Błąd synchronizacji";
                status.style.color = "var(--red)";
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('error-display').style.display = 'block';
                document.getElementById('error-display').textContent = "Nie udało się pobrać danych. Sprawdź czy arkusz jest opublikowany.";
            }
        }

        // Uruchomienie i interwał (odświeżanie co 30 sekund)
        fetchData();
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
